# Render Blueprint — deploys the new microservices world alongside the
# still-live monolith (which is NOT part of this blueprint; it keeps running
# wherever it already runs today). Deploy with: Render Dashboard -> New ->
# Blueprint -> point at this repo.
#
# Only gateway + expense-service exist so far. When auth-service/user-service/
# messaging-service are extracted later, add one `type: web` entry per service
# here (same shape as expense-service below), each referencing the same
# `shared-secrets` env var group so JWT_SECRET stays identical everywhere.

envVarGroups:
  - name: shared-secrets
    envVars:
      # Must be byte-identical to whatever JWT_SECRET the existing monolith
      # already signs cookies with — set manually in the Render dashboard,
      # never committed here. Rotating it logs out every current user.
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15d

services:
  # Public entry point — the only service with a public URL.
  - type: web
    name: gateway
    env: docker
    plan: free
    region: singapore
    dockerfilePath: services/gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Your production client origin(s), comma-separated — used for CORS.
      - key: CLIENT_URL
        sync: false
      # Internal address of expense-service, resolved automatically by Render
      # at deploy time via its private networking (no public URL needed).
      - key: EXPENSE_SERVICE_URL
        fromService:
          type: web
          name: expense-service
          property: hostport
      # The still-live monolith's existing public URL (auth/users/messaging
      # traffic still goes straight there until each feature is extracted).
      - key: MONOLITH_URL
        sync: false

  # New, fully independent feature — PostgreSQL (Neon) via Prisma.
  - type: web
    name: expense-service
    env: docker
    plan: free
    region: singapore
    dockerfilePath: services/expense-service/Dockerfile
    dockerContext: .
    healthCheckPath: /v1/api/health
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: shared-secrets
      # Neon (or any Postgres) connection string — paste in the Render
      # dashboard, not committed here.
      - key: DATABASE_URL
        sync: false
      # Only relevant for this service's own standalone CORS/Swagger use
      # before the gateway centralizes CORS — safe to leave unset.
      - key: CLIENT_URL
        sync: false
