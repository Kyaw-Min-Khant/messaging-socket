envVarGroups:
  - name: shared-secrets
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15d

services:
  # ── Gateway — the only service with a public URL ───────────────────────────
  - type: web
    name: gateway
    env: docker
    plan: free
    region: singapore
    dockerfilePath: services/gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      # Internal addresses — resolved via Render private networking (no public URL)
      - key: MONOLITH_URL
        fromService:
          type: web
          name: monolith
          property: hostport
      - key: EXPENSE_SERVICE_URL
        fromService:
          type: web
          name: expense-service
          property: hostport

  # ── Monolith — auth, messaging, users (internal only) ─────────────────────
  - type: web
    name: monolith
    env: docker
    plan: free
    region: singapore
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: shared-secrets
      # Set these manually in the Render dashboard
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false

  # ── Expense service (internal only) ───────────────────────────────────────
  - type: web
    name: expense-service
    env: docker
    plan: free
    region: singapore
    dockerfilePath: services/expense-service/Dockerfile
    dockerContext: .
    healthCheckPath: /v1/api/health
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: shared-secrets
      - key: DATABASE_URL
        sync: false
